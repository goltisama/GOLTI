    import java.util.Scanner;

    class StackLinkedList {
        static class Node {
            int data;
            Node next;

            Node(int data) {
                this.data = data;
                this.next = null;
            }
        }

        Node top = null;

        void push(int value) {
            Node newNode = new Node(value);
            newNode.next = top;
            top = newNode;
            System.out.println(value + " pushed into stack");
        }

        void pop() {
            if (top == null) {
                System.out.println("Stack is empty");
                return;
            }
            System.out.println("Popped element: " + top.data);
            top = top.next;
        }

        
        void peek() {
            if (top == null) {
                System.out.println("Stack is empty");
            } else {
                System.out.println("Top element: " + top.data);
            }
        }

        void display() {
            if (top == null) {
                System.out.println("Stack is empty");
                return;
            }
            Node temp = top;
            System.out.print("Top → ");
            while (temp != null) {
                System.out.print("[" + temp.data + " | next] → ");
                temp = temp.next;
            }
            System.out.println("null");
        }

        public static void main(String[] args) {
            StackLinkedList stack = new StackLinkedList();
            Scanner sc = new Scanner(System.in);
            int choice;

            System.out.println("\n--- Stack Menu ---");
            System.out.println("1.Push");
            System.out.println("2.Pop");
            System.out.println("3.Peek");
            System.out.println("4.Display");
            System.out.println("5.Exit");

            do {
                System.out.print("Enter choice: ");
                choice = sc.nextInt();

                switch (choice) {
                    case 1:
                        System.out.print("Enter value: ");
                        int val = sc.nextInt();
                        stack.push(val);
                        break;

                    case 2:
                        stack.pop();
                        break;

                    case 3:
                        stack.peek();
                        break;

                    case 4:
                        stack.display();
                        break;

                    case 5:
                        System.out.println("Program Ended");
                        break;

                    default:
                        System.out.println("Invalid choice");
                }

            } while (choice != 5);

            sc.close();
        }
    }
        
    
    import java.util.Scanner;

    class QueueLinkedList {

        static class Node {
            int data;
            Node next;

            Node(int data) {
                this.data = data;
                this.next = null;
            }
        }

        Node front = null;
        Node rear = null;

        void enqueue(int value) {
            Node newNode = new Node(value);

            if (rear == null) {
                front = rear = newNode;
            } else {
                rear.next = newNode;
                rear = newNode;
            }

            System.out.println(value + " inserted into queue");
        }

        void dequeue() {
            if (front == null) {
                System.out.println("Queue is empty");
                return;
            }

            System.out.println("Deleted element: " + front.data);
            front = front.next;

            if (front == null) {
                rear = null;
            }
        }

        void display() {
            if (front == null) {
                System.out.println("Queue is empty");
                return;
            }

            Node temp = front;

            System.out.print("Front → ");

            while (temp != null) {
                System.out.print("[" + temp.data + " | next] → ");
                temp = temp.next;
            }

            System.out.println("null");
        }

        public static void main(String[] args) {

            QueueLinkedList queue = new QueueLinkedList();
            Scanner sc = new Scanner(System.in);
            int choice;

            System.out.println("\n--- Queue Menu ---");
            System.out.println("1.Enqueue");
            System.out.println("2.Dequeue");

                        System.out.println("Program Ended");
                        break;

                    default:
                        System.out.println("Invalid choice");
                }

            } while (choice != 4);

            sc.close();
        }
    }
        
    
    import java.util.*;

    class InfixToPostfix {
        static int p(char c) {
            if (c=='+'||c=='-') return 1;
            if (c=='*'||c=='/') return 2;
            return 0;
        }

        static String convert(String s) {
            Stack<Character> st = new Stack<>();
            String post = "";

            for (char c : s.toCharArray()) {
                if (Character.isLetterOrDigit(c))
                    post += c;
                else if (c == '(')
                    st.push(c);
                else if (c == ')') {
                    while (st.peek() != '(') post += st.pop();
                    st.pop();
                } else {
                    while (!st.isEmpty() && p(c) <= p(st.peek()))
                        post += st.pop();
                    st.push(c); 
                }
            }
            while (!st.isEmpty()) post += st.pop();
            return post;
        }

        public static void main(String[] args) {
            Scanner sc = new Scanner(System.in);
            System.out.print("Enter Infix Expression: ");
            String infix = sc.nextLine();
            System.out.println("Postfix Expression: " + convert(infix));
        }
    }

                preorder(root.left);
                preorder(root.right);
            }
        }

        void postorder(Node root) {
            if (root != null) {
                postorder(root.left);
                postorder(root.right);
                System.out.print(root.data + " ");
            }
        }

            tree.root.left.right = new Node(5);

            System.out.println("Inorder Traversal:");
            tree.inorder(tree.root);

            System.out.println("\nPreorder Traversal:");
            tree.preorder(tree.root);

            System.out.println("\nPostorder Traversal:");
            tree.postorder(tree.root);
